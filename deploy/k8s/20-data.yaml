# Stateful data services: Postgres, Redis, MinIO.
# Set storageClassName to your cluster's class (REPLACE_ME). RWO is fine here.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: openmaic
spec:
  serviceName: postgres
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          env:
            - { name: POSTGRES_USER, value: maic }
            - { name: POSTGRES_DB, value: maic }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: openmaic-secrets, key: POSTGRES_PASSWORD } }
          ports: [{ containerPort: 5432 }]
          volumeMounts: [{ name: data, mountPath: /var/lib/postgresql/data }]
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ['ReadWriteOnce']
        storageClassName: REPLACE_ME
        resources: { requests: { storage: 20Gi } }
---
apiVersion: v1
kind: Service
metadata: { name: postgres, namespace: openmaic }
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: redis, namespace: openmaic }
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ['redis-server', '--appendonly', 'yes']
          ports: [{ containerPort: 6379 }]
---
apiVersion: v1
kind: Service
metadata: { name: redis, namespace: openmaic }
spec:
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata: { name: minio, namespace: openmaic }
spec:
  serviceName: minio
  replicas: 1
  selector: { matchLabels: { app: minio } }
  template:
    metadata: { labels: { app: minio } }
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ['server', '/data', '--console-address', ':9001']
          env:
            - { name: MINIO_ROOT_USER, value: maic }
            - name: MINIO_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: openmaic-secrets, key: MINIO_ROOT_PASSWORD } }
          ports: [{ containerPort: 9000 }, { containerPort: 9001 }]
          volumeMounts: [{ name: data, mountPath: /data }]
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ['ReadWriteOnce']
        storageClassName: REPLACE_ME
        resources: { requests: { storage: 200Gi } }
---
apiVersion: v1
kind: Service
metadata: { name: minio, namespace: openmaic }
spec:
  selector: { app: minio }
  ports: [{ name: api, port: 9000, targetPort: 9000 }, { name: console, port: 9001, targetPort: 9001 }]
