# Fully self-contained GPU stack for a REMOTE deployment.
#
# Unlike docker-compose.dev.yml (host networking, reuses host node_modules,
# expects a host-installed Ollama), this file assumes NOTHING about the host
# except Docker + the NVIDIA Container Toolkit. Postgres, Redis, MinIO, TTS
# (VoxCPM2), and image gen (SDXL) each run as their own container on a
# private compose network, addressed by service name. There is exactly ONE
# unavoidable host-level prerequisite: an NVIDIA driver + the
# nvidia-container-toolkit installed on the remote machine (GPU passthrough
# cannot itself be containerized away).
#
# The LLM has two supported setups:
#   1. External vLLM (or any OpenAI-compatible server) you already run
#      yourself - directly on this host, or on a different machine on the
#      network. Default target is this host's :8001 via Docker's
#      `host-gateway` DNS entry (see `app.extra_hosts`); point elsewhere with
#      MAIC_VLLM_BASE_URL in .env, e.g. http://192.168.x.x:8001/v1.
#   2. Containerized vLLM (the `vllm` service below, profile `local-vllm`) -
#      for machines where you can't install anything outside Docker, so vLLM
#      itself has to run as a container too. Serves openai/gpt-oss-20b by
#      default (sized for a single 32GB GPU). Enable with
#      `--profile local-vllm` on the `up` command, and set
#      MAIC_VLLM_BASE_URL=http://vllm:8000/v1 in .env to point the app at it.
#
# Quick start on a fresh remote GPU box (external vLLM):
#   git clone <this repo> && cd maic
#   cp .env.remote.example .env               # then EDIT the passwords/secret
#   docker compose -f docker-compose.remote.yml up -d --build
#   docker compose -f docker-compose.remote.yml logs -f app
#   open http://<remote-host>:3000
#
# Quick start with the containerized vLLM instead (setup 2 above):
#   docker compose -f docker-compose.remote.yml --profile local-vllm up -d --build
#
# Prerequisites on the remote host (the one thing this file can't provide):
#   - NVIDIA driver installed
#   - nvidia-container-toolkit installed + configured (`nvidia-ctk runtime configure
#     --runtime=docker && systemctl restart docker`)
#   - verify with: docker run --rm --gpus all nvidia/cuda:12.8.0-base-ubuntu24.04 nvidia-smi
#   - if using setup 1: vLLM (or any OpenAI-compatible server) already
#     running and reachable on :8001, serving whatever model
#     MAIC_DEFAULT_MODEL names
#
# Everything below this line runs the same on any such machine.

services:
  # ---------------------------------------------------------------------------
  # data infra
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: maic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maic_dev_pw}
      POSTGRES_DB: maic
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U maic -d maic']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [maic-net]

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [maic-net]

  minio:
    image: minio/minio:latest
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: maic
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-maic_dev_pw}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [maic-net]
    ports:
      - '${MAIC_MINIO_CONSOLE_PORT:-9001}:9001' # console UI, optional to expose

  # One-shot: create the media bucket (MinIO doesn't auto-create it).
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 maic ${MINIO_ROOT_PASSWORD:-maic_dev_pw} &&
      mc mb -p local/maic-media
      "
    restart: 'no'
    networks: [maic-net]

  # ---------------------------------------------------------------------------
  # local GPU models — TTS (VoxCPM2), image gen (SDXL). The LLM is external
  # (host-run vLLM on :8001, see `app.extra_hosts` below) - not defined here.
  # ---------------------------------------------------------------------------
  tts:
    build:
      context: ./deploy/tts-voxcpm
    restart: unless-stopped
    networks: [maic-net]
    environment:
      # Same Xet-CDN-blocked-by-network issue as the vllm service below: even
      # with a fully-primed cache, huggingface_hub still tries to verify/
      # reconstruct files via HF's Xet CAS backend (cas-server.xethub.hf.co)
      # unless this is disabled, which fails outright on networks that block
      # it. HF_HUB_OFFLINE additionally guarantees this service NEVER makes
      # an HF network call once primed - it fails loudly instead of silently
      # reaching out, so "runs from the container's cache only" is enforced,
      # not just hoped for.
      HF_HUB_DISABLE_XET: '1'
      HF_HUB_OFFLINE: '1'
    volumes:
      # Persists the openbmb/VoxCPM2 download across restarts - also lets
      # you pre-populate it (see docker-compose.remote.yml's LLM comments
      # above re: networks that block HF's storage CDN domains) by copying
      # a `huggingface-cli download` from elsewhere into this volume's
      # backing dir instead of downloading on first request.
      - tts_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  image:
    build:
      context: ./deploy/image-sdxl
    restart: unless-stopped
    networks: [maic-net]
    environment:
      # See the tts service's identical comment above - same Xet CDN issue,
      # same fix.
      HF_HUB_DISABLE_XET: '1'
      HF_HUB_OFFLINE: '1'
    volumes:
      # Same rationale as tts_cache above - persists the SDXL download,
      # which only actually happens on the FIRST real image-generation
      # request (health checks don't trigger it), not at container start.
      - image_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ---------------------------------------------------------------------------
  # LLM — vLLM serving openai/gpt-oss-20b, containerized. Optional: only
  # starts with `docker compose --profile local-vllm up`, for machines that
  # can't install anything outside Docker (so vLLM itself has to run as a
  # container here too) and don't have GPU headroom for anything bigger.
  # Machines pointing at vLLM running elsewhere (host-installed, or a
  # different box - see MAIC_VLLM_BASE_URL below) skip this profile entirely
  # and never build/run it.
  # ---------------------------------------------------------------------------
  vllm:
    # Pinned, NOT :latest. vLLM's :latest tag has moved to a CUDA>=13.0 base
    # (NVIDIA_REQUIRE_CUDA=cuda>=13.0) - it'll fail outright
    # ("nvidia-container-cli: requirement error: unsatisfied condition:
    # cuda>=13.0") on any host whose driver reports a lower max CUDA version
    # (`nvidia-smi`'s top-right "CUDA Version" field), which is a driver
    # upgrade you likely can't do on a host you don't control.
    #
    # v0.10.1, NOT the original :gptoss launch-day tag. :gptoss
    # (0.10.2.dev2+gf5635d62e, built 2025-08-05) has a real bug on Blackwell
    # consumer cards (sm_120, e.g. RTX 5090): gpt-oss's attention-sinks
    # feature asserts either FlashAttention 3 (impossible on Blackwell - FA3
    # explicitly excludes compute capability >=10 entirely) or, via
    # FlashInfer, a hard `assert sinks.dtype == torch.float32` that fails
    # since the model keeps sinks in bf16 - vllm-project/vllm#22279. v0.10.1
    # (released 2025-08-19, the fix for that exact issue) removes that
    # assertion in vllm/v1/attention/backends/flashinfer.py, confirmed by
    # inspecting both images' source directly. Still CUDA 12.8 (confirmed via
    # `docker run --entrypoint python3 vllm/vllm-openai:v0.10.1 -c "import
    # torch; print(torch.version.cuda)"` -> 12.8), so no driver problem.
    # (Note: this version's TRT-LLM auto-routing for sinks requires compute
    # capability *exactly* 100/SM100 i.e. datacenter Blackwell - sm_120
    # consumer cards don't qualify, hence forcing FLASHINFER explicitly below
    # rather than relying on that path.)
    image: vllm/vllm-openai:v0.10.1
    profiles: ['local-vllm']
    # Local filesystem path, NOT the bare repo id "openai/gpt-oss-20b": some
    # networks (e.g. a campus/lab proxy) intercept HF's storage CDN
    # (huggingface.co redirects AND the Xet path both land on domains this
    # kind of network MITMs with a self-signed cert - SSL_CERT_VERIFY_FAILED)
    # badly enough that vLLM's own config/tokenizer fetch dies outright, even
    # with HF_HUB_DISABLE_XET set. A literal path bypasses the Hub client
    # entirely (pure local load, no network/variant/completeness resolution
    # at all) - same trick as _resolve_local() in deploy/image-sdxl/server.py.
    # Primed via `./prime-model-cache.sh gptoss` into vllm_cache below - see
    # that script for how the directory gets populated.
    # This GPU is shared with the image/tts services (they stay resident once
    # warmed, ~16GB combined observed on a 32GB card) - vLLM can't use its
    # default 90%-of-total/full-131072-context assumptions, which expect
    # near-exclusive GPU access.
    #
    # gpu-memory-utilization is a fraction of *total* device memory reserved
    # for vLLM's entire footprint (weights + KV cache), not a fraction of
    # free memory - so it has to be set high enough to at least cover the
    # 13.7GiB the weights alone take once loaded. 0.42 and 0.35 were both
    # too LOW for that (KV cache init failed with "No available memory for
    # the cache blocks", i.e. negative KV budget - see PR #26 for why the
    # raw weight-loading OOM those were chasing was actually an allocator
    # fragmentation bug, fixed separately via PYTORCH_CUDA_ALLOC_CONF below).
    # 0.48 (~15.06GiB) turned out too HIGH the other way: vLLM's own preflight
    # check ("Free memory on device (14.89/31.37 GiB) on startup is less
    # than desired GPU memory utilization") refuses to even start if the
    # utilization*total budget exceeds real free memory at boot, and 15.06
    # exceeded the observed 14.89GiB free with image/tts resident. The valid
    # window here is genuinely narrow (~0.44-0.47): must clear 13.7GiB of
    # weights but stay under ~14.9GiB real free. 0.46 (~14.43GiB) covers the
    # weights and passes preflight, but "Available KV cache memory" came out
    # to only ~0.02GiB - and confirmed via two separate runs (max-model-len
    # 32768 and 4096 both reported the identical 0.02GiB) that this number is
    # a function of gpu-memory-utilization ALONE, not max-model-len - it's
    # (budget - peak process usage during weight load + torch.compile/
    # cudagraph capture), computed before max-model-len is even considered.
    # So lowering max-model-len alone can't fix an empty KV budget; only
    # raising utilization can. Peak process usage backs out to ~14.41GiB
    # (14.43 - 0.02), leaving genuine headroom up to the ~14.89GiB real-free
    # ceiling - 0.47 (~14.74GiB budget) should yield ~0.33GiB available,
    # comfortably above the ~0.14GiB max-model-len=4096 needs, while staying
    # under the 0.48-that-failed-preflight line. If this GPU's other-service
    # footprint grows, `nvidia-smi --query-gpu=memory.free --format=csv` and
    # recompute - there may be no valid utilization value left if free drops
    # much below ~14.5GiB.
    command: ['--model', '/root/.cache/huggingface/local-models/gpt-oss-20b', '--served-model-name', 'openai/gpt-oss-20b', '--port', '8000', '--max-model-len', '4096', '--gpu-memory-utilization', '0.47']
    environment:
      HF_HUB_OFFLINE: '1' # belt-and-suspenders: a local path load shouldn't touch the network anyway
      HF_HUB_DISABLE_XET: '1'
      # Force FlashInfer explicitly rather than relying on auto-detection:
      # FA3 is impossible on this GPU regardless (Blackwell is excluded from
      # FA3 entirely), and this image (unlike :gptoss) doesn't have the sinks
      # dtype bug in its FlashInfer backend - see the image tag comment above.
      VLLM_ATTENTION_BACKEND: 'FLASHINFER'
      # Weight loading OOM'd needing just ~70MB more than was free
      # ("Tried to allocate 1.08 GiB... 1.01 GiB is free") on a GPU this
      # tightly shared with image/tts - gpu-memory-utilization doesn't help
      # here since it only governs the KV-cache pool reserved *after* weights
      # finish loading. This is PyTorch's own suggested fix for allocator
      # fragmentation right in the OOM message.
      PYTORCH_CUDA_ALLOC_CONF: 'expandable_segments:True'
    # vLLM's docs suggest --ipc=host for shared memory between its worker
    # processes, but sharing the host's IPC namespace is exactly the kind of
    # privilege-escalation setting shared-host admin policies (e.g. an OPA
    # docker-authz plugin) commonly reject outright - as opposed to a plain
    # per-container shm size bump, which stays inside this container's own
    # namespace and needs no elevated privilege.
    shm_size: '2gb'
    volumes:
      - vllm_cache:/root/.cache/huggingface # persist the ~13GB model download across restarts
    restart: unless-stopped
    networks: [maic-net]
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s # first boot downloads the model; give it room
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ---------------------------------------------------------------------------
  # app
  # ---------------------------------------------------------------------------

  # One-shot: run DB migrations (+ optional dev-account seed) before the app
  # starts. Built from the `builder` stage (has full deps incl. drizzle-kit),
  # unlike the slim `runner` stage the app itself uses.
  migrate:
    build:
      context: ./OpenMAIC
      dockerfile: Dockerfile
      target: builder
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://maic:${POSTGRES_PASSWORD:-maic_dev_pw}@postgres:5432/maic
      MAIC_SEED_DEV_USERS: ${MAIC_SEED_DEV_USERS:-true}
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        pnpm exec drizzle-kit migrate
        if [ "$$MAIC_SEED_DEV_USERS" != "false" ]; then pnpm tsx lib/db/seed.ts; fi
    restart: 'no'
    networks: [maic-net]

  app:
    build:
      context: ./OpenMAIC
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    # Lets the app container reach a vLLM server running directly on THIS
    # host (bridge-networked containers can't use "localhost" for that - it'd
    # mean itself) via a DNS name mapped to the host's gateway IP. Harmless
    # to keep even when vLLM lives on a different machine (MAIC_VLLM_BASE_URL
    # below then points elsewhere and this alias just goes unused).
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      NODE_ENV: production
      # Bare model name vLLM serves - e.g. openai/gpt-oss-120b. Required (no
      # default): guessing here would fail silently.
      #
      # IMPORTANT: DEFAULT_MODEL alone does NOT make the app actually use
      # this model. The interactive UI always sends an explicit x-model
      # header built client-side from the provider's *advertised* model
      # list (GET /api/server-providers) - DEFAULT_MODEL is only consulted
      # as a last-resort fallback that path never reaches (it's real, but
      # effectively eval-script-only). LEMONADE_MODELS is what actually
      # populates that advertised list, which is what the client-side model
      # picker defaults to - without it, the client falls back to the
      # lemonade provider's built-in placeholder model
      # (lib/ai/providers.ts) instead of your real one. Both are derived
      # from MAIC_VLLM_MODEL below so they can't drift apart.
      DEFAULT_MODEL: lemonade:${MAIC_VLLM_MODEL:?Set MAIC_VLLM_MODEL=<model-name-vllm-serves> in .env}
      LEMONADE_MODELS: ${MAIC_VLLM_MODEL:?Set MAIC_VLLM_MODEL=<model-name-vllm-serves> in .env}
      # 'lemonade' = this app's keyless OpenAI-compatible provider (no API key
      # needed) - works with any OpenAI-compatible server, including vLLM.
      # Defaults to the host vLLM is normally documented as running on; set
      # MAIC_VLLM_BASE_URL in .env if vLLM instead runs on a different
      # machine on the network (e.g. http://192.168.x.x:8001/v1).
      LEMONADE_BASE_URL: ${MAIC_VLLM_BASE_URL:-http://host.docker.internal:8001/v1}
      NEXT_PUBLIC_MAIC_EDITOR_ENABLED: 'true'
      PARALLEL_SCENE_CONCURRENCY: '4'
      DATABASE_URL: postgresql://maic:${POSTGRES_PASSWORD:-maic_dev_pw}@postgres:5432/maic
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: ${SESSION_SECRET:?Set a real SESSION_SECRET in .env before starting}
      AUTH_MODE: dev # dev local accounts; 'ldap' wires the AD adapter later
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: maic
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-maic_dev_pw}
      S3_BUCKET: maic-media
      TTS_VOXCPM_BASE_URL: http://tts:8000/v1
      IMAGE_LEMONADE_BASE_URL: http://image:8001/v1
    ports:
      - '${MAIC_APP_PORT:-3000}:3000'
    healthcheck:
      # 127.0.0.1, not localhost: this container's /etc/resolv.conf resolves
      # "localhost" to ::1 only, but Next's server binds IPv4-only (0.0.0.0),
      # so wget-via-hostname always got connection-refused on the (empty)
      # IPv6 loopback even though the app was actually up and serving fine.
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/api/health']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks: [maic-net]

networks:
  maic-net:

volumes:
  pg_data:
  redis_data:
  minio_data:
  vllm_cache:
  tts_cache:
  image_cache:
